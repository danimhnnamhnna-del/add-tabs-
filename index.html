<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabs</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="tabs">
      <div class="tabs-container">
        <div class="tabs-header" id="tabsHeader">
          <button class="tab-btn active" data-tab-target="#html-tab">
            HTML
          </button>
          <button class="tab-btn" data-tab-target="#css-tab">CSS</button>
          <button class="tab-btn" data-tab-target="#js-tab">JS</button>
          <button id="addTabBtn" class="add-btn">+</button>
        </div>

        <div class="tabs-content" id="tabsContent">
          <div id="html-tab" class="tab-panel active">
            <h3>HTML Content</h3>
            <p>HTML provides the structure of the page.</p>
          </div>
          <div id="css-tab" class="tab-panel">
            <h3>CSS Content</h3>
            <p>CSS defines the styling and layout.</p>
          </div>
          <div id="js-tab" class="tab-panel">
            <h3>JS Content</h3>
            <p>JavaScript adds interactivity and logic.</p>
          </div>
        </div>
      </div>
    </div>
    <script src="./js/main.js"></script>
  </body>
</html>
